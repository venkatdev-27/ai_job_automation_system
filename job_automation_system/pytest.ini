# pytest configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

# Markers
markers =
    integration: Integration tests (require Redis/MongoDB)
    unit: Unit tests (no external dependencies)
    slow: Tests that take longer to run

# Ignore paths
norecursedirs = 
    .git
    .venv
    node_modules
    __pycache__
    *.egg-info

# Timeout (optional)
# timeout = 300

# Warning filters for cleaner test output
filterwarnings =
    ignore:All support for the `google\.generativeai` package has ended.*:FutureWarning:langchain_google_genai\.chat_models
